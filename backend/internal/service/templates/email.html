<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Subject}}</title>
</head>
<body style="margin:0;padding:0;background-color:#faf8f5;font-family:Inter,Arial,sans-serif;-webkit-font-smoothing:antialiased">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center" style="padding:40px 20px">
        <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:580px">

          <!-- Header -->
          <tr>
            <td style="background-color:#ea6c2c;border-radius:12px 12px 0 0;padding:32px;text-align:center">
              <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px">Family Board</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background-color:#ffffff;padding:40px 36px">
              <h1 style="margin:0 0 16px;font-size:20px;font-weight:600;color:#1a1a1a;letter-spacing:-0.2px">{{.Heading}}</h1>
              {{if .Name}}<p style="margin:0 0 12px;font-size:15px;color:#374151">Hi {{.Name}},</p>{{end}}
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#374151">{{.Body}}</p>
              {{if .ButtonURL}}
              <table cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td style="border-radius:8px;background-color:#ea6c2c">
                    <a href="{{.ButtonURL}}" style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none">{{.ButtonText}}</a>
                  </td>
                </tr>
              </table>
              {{end}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#faf8f5;border-radius:0 0 12px 12px;padding:24px 36px;text-align:center;border-top:1px solid #f0ece6">
              <p style="margin:0;font-size:12px;color:#9ca3af">Family Board &mdash; your self-hosted family wall.</p>
              <p style="margin:6px 0 0;font-size:12px;color:#9ca3af">You received this email because an action was taken on your account.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
