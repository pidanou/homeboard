services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: familyboard
      POSTGRES_USER: familyboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - back.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://familyboard:${POSTGRES_PASSWORD}@db:5432/familyboard?sslmode=disable
      UPLOAD_DIR: /app/uploads
      PORT: 8080
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_ENV: ${VITE_APP_ENV:-local}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
  uploads_data:
